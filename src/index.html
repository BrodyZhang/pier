<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            touch-action: none;
            background: #1a1a2e;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }
        canvas { display: block; margin: 0 auto; }
        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        #score {
            font-size: 24px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            font-weight: bold;
        }
        #level {
            font-size: 18px;
            color: #ff0;
            text-shadow: 0 0 10px #ff0;
        }
        #refresh {
            padding: 8px 20px;
            font-size: 16px;
            background: linear-gradient(180deg, #4a4, #262);
            border: none;
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,255,0,0.3);
        }
        #refresh:active { transform: scale(0.95); }
        #start, #over, #pause {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.85);
            z-index: 20;
        }
        #over, #pause { display: none; }
        h1 { font-size: 42px; color: #0f0; text-shadow: 0 0 20px #0f0; margin-bottom: 15px; }
        p { font-size: 20px; color: #ccc; margin-bottom: 25px; }
        button {
            padding: 15px 50px;
            font-size: 20px;
            background: linear-gradient(180deg, #0f0, #0a0);
            border: none;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,255,0,0.5);
        }
        button:active { transform: scale(0.95); }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn {
            width: 60px;
            height: 60px;
            background: rgba(0,255,0,0.2);
            border: 2px solid #0f0;
            border-radius: 10px;
            color: #0f0;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .btn:active { background: rgba(0,255,0,0.5); }
    </style>
</head>
<body>
    <div id="ui">
        <div>
            <div id="score">得分: 0</div>
            <div id="level">等级: 1</div>
        </div>
        <button id="refresh" onclick="location.reload()">刷新</button>
    </div>
    <div id="start">
        <h1>🐍 贪吃蛇</h1>
        <p>控制蛇吃到食物变长</p>
        <button onclick="start()">开始游戏</button>
        <div class="controls">
            <div class="btn" onclick="setDir(0,-1)">↑</div>
            <div></div>
            <div class="btn" onclick="setDir(-1,0)">←</div>
            <div class="btn" onclick="setDir(0,1)">↓</div>
            <div class="btn" onclick="setDir(1,0)">→</div>
        </div>
    </div>
    <div id="over">
        <h1>游戏结束</h1>
        <p>最终得分: <span id="final">0</span></p>
        <button onclick="start()">重新开始</button>
    </div>
    <div id="pause">
        <h1>暂停</h1>
        <p>点击屏幕继续</p>
    </div>
    <canvas id="c"></canvas>
    <script>
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');

        let size = 20;
        let cols, rows;
        let W, H;

        function sizeCanvas() {
            const maxSize = Math.min(window.innerWidth, window.innerHeight - 100);
            cols = Math.floor(maxSize / size);
            rows = Math.floor(maxSize / size);
            W = cols * size;
            H = rows * size;
            c.width = W;
            c.height = H;
            c.style.marginTop = (window.innerHeight - H) / 2 + 'px';
        }
        sizeCanvas();
        window.onresize = sizeCanvas;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playEat() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playDie() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function playLevelUp() {
            [523, 659, 784, 1047].forEach((n, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.setValueAtTime(n, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.2);
                }, i * 100);
            });
        }

        let running = false;
        let paused = false;
        let score = 0;
        let level = 1;
        let frame = 0;
        let speed = 10;

        let snake = [];
        let food = {};
        let bonusFood = null;
        let dx = 0, dy = 0;
        let nextDx = 0, nextDy = 0;

        function reset() {
            snake = [
                { x: Math.floor(cols / 2), y: Math.floor(rows / 2) },
                { x: Math.floor(cols / 2), y: Math.floor(rows / 2) + 1 },
                { x: Math.floor(cols / 2), y: Math.floor(rows / 2) + 2 }
            ];
            dx = 0; dy = -1;
            nextDx = 0; nextDy = -1;
            score = 0;
            level = 1;
            speed = 10;
            frame = 0;
            bonusFood = null;
            spawnFood();
            updateUI();
        }

        function start() {
            document.getElementById('start').style.display = 'none';
            document.getElementById('over').style.display = 'none';
            document.getElementById('pause').style.display = 'none';
            if (audioCtx.state === 'suspended') audioCtx.resume();
            reset();
            running = true;
            paused = false;
        }

        function spawnFood() {
            let valid = false;
            while (!valid) {
                food = {
                    x: Math.floor(Math.random() * cols),
                    y: Math.floor(Math.random() * rows)
                };
                valid = !snake.some(s => s.x === food.x && s.y === food.y);
            }
        }

        function spawnBonus() {
            let valid = false;
            while (!valid) {
                bonusFood = {
                    x: Math.floor(Math.random() * cols),
                    y: Math.floor(Math.random() * rows),
                    time: 300
                };
                valid = !snake.some(s => s.x === bonusFood.x && s.y === bonusFood.y);
            }
        }

        function updateUI() {
            document.getElementById('score').innerText = '得分: ' + score;
            document.getElementById('level').innerText = '等级: ' + level;
        }

        function setDir(x, y) {
            if (!running || paused) return;
            if (dx === -x && dy === -y) return;
            nextDx = x;
            nextDy = y;
        }

        function keyDown(e) {
            if (e.code === 'Space') {
                if (running && !paused) {
                    paused = true;
                    document.getElementById('pause').style.display = 'flex';
                } else if (paused) {
                    paused = false;
                    document.getElementById('pause').style.display = 'none';
                }
                return;
            }
            if (e.code === 'ArrowUp' || e.code === 'KeyW') setDir(0, -1);
            if (e.code === 'ArrowDown' || e.code === 'KeyS') setDir(0, 1);
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') setDir(-1, 0);
            if (e.code === 'ArrowRight' || e.code === 'KeyD') setDir(1, 0);
        }

        window.addEventListener('keydown', keyDown);
        c.ontouchstart = (e) => {
            e.preventDefault();
            if (!running) return;
            if (paused) {
                paused = false;
                document.getElementById('pause').style.display = 'none';
                return;
            }
            const t = e.touches[0];
            const cx = playerX || W/2;
            const cy = playerY || H/2;
            const dx = t.clientX - cx;
            const dy = t.clientY - cy;
            if (Math.abs(dx) > Math.abs(dy)) {
                setDir(dx > 0 ? 1 : -1, 0);
            } else {
                setDir(0, dy > 0 ? 1 : -1);
            }
        };

        let playerX = 0, playerY = 0;
        c.ontouchmove = (e) => {
            const t = e.touches[0];
            playerX = t.clientX;
            playerY = t.clientY;
        };

        function update() {
            if (!running || paused) return;
            frame++;

            if (frame % (12 - Math.min(8, speed)) !== 0) return;

            dx = nextDx;
            dy = nextDy;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Wall wrap
            if (head.x < 0) head.x = cols - 1;
            if (head.x >= cols) head.x = 0;
            if (head.y < 0) head.y = rows - 1;
            if (head.y >= rows) head.y = 0;

            // Self collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                running = false;
                playDie();
                document.getElementById('final').innerText = score;
                document.getElementById('over').style.display = 'flex';
                return;
            }

            snake.unshift(head);

            // Eat food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                playEat();
                spawnFood();

                if (score % 50 === 0) {
                    level++;
                    speed++;
                    playLevelUp();
                }

                if (score % 30 === 0 && !bonusFood) {
                    spawnBonus();
                }
                updateUI();
            } else if (bonusFood && head.x === bonusFood.x && head.y === bonusFood.y) {
                score += 30;
                playEat();
                bonusFood = null;
                updateUI();
            } else {
                snake.pop();
            }

            // Bonus countdown
            if (bonusFood) {
                bonusFood.time--;
                if (bonusFood.time <= 0) bonusFood = null;
            }
        }

        function draw() {
            // Background
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            // Grid
            ctx.strokeStyle = 'rgba(0,255,0,0.1)';
            for (let i = 0; i <= cols; i++) {
                ctx.beginPath();
                ctx.moveTo(i * size, 0);
                ctx.lineTo(i * size, H);
                ctx.stroke();
            }
            for (let i = 0; i <= rows; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * size);
                ctx.lineTo(W, i * size);
                ctx.stroke();
            }

            // Food
            const fx = food.x * size + size/2;
            const fy = food.y * size + size/2;
            const fGrad = ctx.createRadialGradient(fx, fy, 0, fx, fy, size/2);
            fGrad.addColorStop(0, '#ff0');
            fGrad.addColorStop(1, '#f00');
            ctx.fillStyle = fGrad;
            ctx.beginPath();
            ctx.arc(fx, fy, size/2 - 2, 0, Math.PI * 2);
            ctx.fill();

            // Bonus food (star)
            if (bonusFood) {
                const bx = bonusFood.x * size + size/2;
                const by = bonusFood.y * size + size/2;
                ctx.fillStyle = `rgba(255,0,255,${0.5 + Math.sin(frame * 0.2) * 0.5})`;
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * 4 * Math.PI / 5) - Math.PI / 2;
                    const r = i % 2 === 0 ? size/2 : size/4;
                    ctx.lineTo(bx + Math.cos(angle) * r, by + Math.sin(angle) * r);
                }
                ctx.closePath();
                ctx.fill();
            }

            // Snake
            snake.forEach((s, i) => {
                const x = s.x * size;
                const y = s.y * size;

                if (i === 0) {
                    // Head
                    ctx.fillStyle = '#0f0';
                    ctx.fillRect(x + 1, y + 1, size - 2, size - 2);

                    // Eyes
                    ctx.fillStyle = '#000';
                    const eyes = { '0,-1': [3, 5], '0,1': [3, 13], '-1,0': [5, 7], '1,0': [13, 7] };
                    const key = `${dx},${dy}`;
                    if (eyes[key]) {
                        ctx.fillRect(x + eyes[key][0], y + eyes[key][1], 4, 4);
                        ctx.fillRect(x + eyes[key][0] + 8, y + eyes[key][1], 4, 4);
                    }
                } else {
                    // Body with gradient
                    const grad = ctx.createLinearGradient(x, y, x + size, y + size);
                    grad.addColorStop(0, '#0a0');
                    grad.addColorStop(1, '#0f0');
                    ctx.fillStyle = grad;
                    ctx.fillRect(x + 1, y + 1, size - 2, size - 2);
                }
            });

            // Watermark
            ctx.font = '12px sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fillText('AI 自动化学习中...', 5, H - 5);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
