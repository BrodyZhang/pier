<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>致我最爱的人</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            touch-action: none;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            user-select: none;
        }
        canvas { display: block; position: fixed; top: 0; left: 0; }

        #refresh {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 25px;
            font-size: 16px;
            background: linear-gradient(135deg, #e94560, #c0392b);
            border: none;
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(233,69,96,0.4);
            z-index: 100;
        }
        #refresh:active { transform: scale(0.95); }

        #main {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 48px;
            color: #fff;
            text-shadow: 0 0 30px rgba(233,69,96,0.8);
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .heart {
            font-size: 100px;
            animation: heartbeat 1s infinite;
            cursor: pointer;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1); }
            75% { transform: scale(1.1); }
        }

        p {
            font-size: 20px;
            color: rgba(255,255,255,0.8);
            margin: 20px 0;
            line-height: 1.8;
        }

        .love-list {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin: 20px;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }

        .love-list h2 {
            color: #e94560;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .love-item {
            color: #fff;
            padding: 8px 0;
            font-size: 18px;
        }

        #ai-tag {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #667eea, #764ba2);
            padding: 12px 30px;
            border-radius: 30px;
            color: #fff;
            font-size: 16px;
            box-shadow: 0 4px 20px rgba(102,126,234,0.5);
            z-index: 100;
        }

        #ai-tag span {
            color: #ffd700;
            font-weight: bold;
        }

        .btn {
            background: linear-gradient(135deg, #e94560, #c0392b);
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            color: #fff;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 4px 15px rgba(233,69,96,0.4);
        }
        .btn:active { transform: scale(0.95); }

        #message {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #message .msg-box {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 40px;
            border-radius: 20px;
            max-width: 350px;
            text-align: center;
        }
        #message h2 {
            color: #e94560;
            font-size: 28px;
            margin-bottom: 20px;
        }
        #message p {
            font-size: 18px;
            color: #ccc;
        }
        #message .close {
            margin-top: 20px;
            background: #667eea;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>

    <button id="refresh" onclick="location.reload()">🔄 刷新</button>

    <div id="main">
        <div class="heart" onclick="showLove()">💕</div>
        <h1>给我的宝贝</h1>
        <p>你是我最美的遇见<br>我想把全世界最好的都给你</p>

        <div class="love-list">
            <h2>💖 我爱你的理由 💖</h2>
            <div class="love-item">1. 你的笑容像阳光一样温暖</div>
            <div class="love-item">2. 你的眼睛里有星辰大海</div>
            <div class="love-item">3. 你是世界上最善良的女孩</div>
            <div class="love-item">4. 和你在一起的每分每秒</div>
            <div class="love-item">5. 你是我一生的挚爱</div>
        </div>

        <button class="btn" onclick="showMessage()">💌 给宝贝的情话</button>
        <button class="btn" onclick="showPromise()">💍 我的承诺</button>
    </div>

    <div id="message" style="display: none;" onclick="closeMessage(event)">
        <div class="msg-box" onclick="event.stopPropagation()">
            <h2 id="msg-title">💌 情话</h2>
            <p id="msg-text">Loading...</p>
            <button class="btn close" onclick="document.getElementById('message').style.display='none'">关闭</button>
        </div>
    </div>

    <div id="ai-tag">
        🤖 <span>AI</span> 智能学习自动建站中...
    </div>

    <script>
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        let W, H;

        function size() {
            W = c.width = window.innerWidth;
            H = c.height = window.innerHeight;
        }
        size();
        window.onresize = size;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playHeart() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(523, audioCtx.currentTime);
            osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
            osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        const hearts = [];
        const stars = [];

        for (let i = 0; i < 50; i++) {
            stars.push({
                x: Math.random() * W,
                y: Math.random() * H * 0.7,
                r: Math.random() * 2 + 1,
                twinkle: Math.random() * Math.PI * 2
            });
        }

        function spawnHeart() {
            hearts.push({
                x: Math.random() * W,
                y: H + 50,
                v: 1 + Math.random() * 2,
                size: 15 + Math.random() * 20,
                rot: Math.random() * Math.PI * 2,
                vRot: (Math.random() - 0.5) * 0.05,
                alpha: 1
            });
        }

        setInterval(spawnHeart, 500);

        let frame = 0;

        function draw() {
            ctx.clearRect(0, 0, W, H);

            // Stars
            stars.forEach(s => {
                s.twinkle += 0.03;
                const a = 0.5 + Math.sin(s.twinkle) * 0.5;
                ctx.fillStyle = `rgba(255,255,255,${a})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
            });

            // Hearts
            hearts.forEach((h, i) => {
                h.y -= h.v;
                h.rot += h.vRot;

                ctx.save();
                ctx.translate(h.x, h.y);
                ctx.rotate(h.rot);
                ctx.globalAlpha = h.alpha;
                ctx.fillStyle = '#e94560';
                ctx.font = h.size + 'px Arial';
                ctx.fillText('❤️', -h.size/2, h.size/3);
                ctx.restore();

                if (h.y < -50) hearts.splice(i, 1);
            });

            requestAnimationFrame(draw);
        }
        draw();

        function showLove() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playHeart();
            for (let i = 0; i < 20; i++) {
                setTimeout(spawnHeart, i * 50);
            }
        }

        const messages = [
            "宝贝，你是我这辈子最大的幸运",
            "我想和你一起慢慢变老",
            "你的笑容比春天的花还要美",
            "我爱你，不只是说说而已",
            "你是我的唯一，我的全世界",
            "只要有你在，其他的都是风景",
            "我想陪你走过每一个春夏秋冬",
            "你是我心里最柔软的地方",
            "遇见你，是我最美的意外",
            "我会永远爱你，直到地老天荒"
        ];

        const promises = [
            "我会永远陪在你身边",
            "永远不让你受委屈",
            "会把最好的都给你",
            "每天都会逗你开心",
            "永远不欺骗你",
            "把你宠成小公主",
            "陪你一起实现梦想",
            "给你一个温暖的家",
            "和你一起慢慢变老",
            "永远把你放在第一位"
        ];

        function showMessage() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playHeart();
            const msg = messages[Math.floor(Math.random() * messages.length)];
            document.getElementById('msg-title').innerText = '💌 送给最爱的你';
            document.getElementById('msg-text').innerText = msg;
            document.getElementById('message').style.display = 'flex';
        }

        function showPromise() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playHeart();
            const p = promises[Math.floor(Math.random() * promises.length)];
            document.getElementById('msg-title').innerText = '💍 我的承诺';
            document.getElementById('msg-text').innerText = p;
            document.getElementById('message').style.display = 'flex';
        }

        function closeMessage(e) {
            if (e.target.id === 'message') {
                document.getElementById('message').style.display = 'none';
            }
        }
    </script>
</body>
</html>
