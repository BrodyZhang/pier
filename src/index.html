<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>跳跳龙</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            touch-action: none;
            background: #87CEEB;
            font-family: sans-serif;
            user-select: none;
        }
        canvas { display: block; }
        #score {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            color: #fff;
            text-shadow: 2px 2px 4px #000;
            z-index: 10;
        }
        #start, #over {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.5);
            z-index: 20;
        }
        #over { display: none; }
        h1 { font-size: 40px; color: #FFD700; margin-bottom: 10px; }
        p { font-size: 18px; color: #fff; margin-bottom: 20px; }
        button {
            padding: 12px 30px;
            font-size: 18px;
            background: #FFD700;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="score">0</div>
    <div id="start">
        <h1>🐉 跳跳龙</h1>
        <p>点击或按空格跳跃</p>
        <button onclick="start()">开始</button>
    </div>
    <div id="over">
        <h1>游戏结束</h1>
        <p>得分: <span id="final">0</span></p>
        <button onclick="start()">再来</button>
    </div>
    <canvas id="c"></canvas>
    <script>
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        let W, H;

        function size() {
            W = c.width = window.innerWidth;
            H = c.height = window.innerHeight;
        }
        size();
        window.onresize = size;

        // Sound effects using Web Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playJump() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }
        function playScore() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }
        function playOver() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        let running = false;
        let score = 0;
        let frame = 0;
        let gameSpeed = 5;

        const dragon = { x: 100, y: 0, vy: 0, r: 30, ground: 0 };
        const obstacles = [];

        function reset() {
            dragon.y = dragon.ground;
            dragon.vy = 0;
            obstacles.length = 0;
            score = 0;
            frame = 0;
            gameSpeed = 5;
            document.getElementById('score').innerText = '0';
        }

        function start() {
            document.getElementById('start').style.display = 'none';
            document.getElementById('over').style.display = 'none';
            if (audioCtx.state === 'suspended') audioCtx.resume();
            reset();
            running = true;
        }

        function jump() {
            if (!running) return;
            if (dragon.y >= dragon.ground - 5) {
                dragon.vy = -15;
                playJump();
            }
        }

        function update() {
            if (!running) return;
            frame++;

            dragon.vy += 0.8;
            dragon.y += dragon.vy;
            if (dragon.y > dragon.ground) {
                dragon.y = dragon.ground;
                dragon.vy = 0;
            }

            if (frame % 90 === 0) {
                obstacles.push({ x: W, h: 40 + Math.random() * 30 });
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= gameSpeed;
                if (obstacles[i].x < -50) {
                    obstacles.splice(i, 1);
                    score++;
                    document.getElementById('score').innerText = score;
                    playScore();
                    if (score % 5 === 0) gameSpeed += 0.5;
                }

                // Collision
                const o = obstacles[i];
                if (dragon.x + dragon.r > o.x && dragon.x - dragon.r < o.x + 30 &&
                    dragon.y + dragon.r > dragon.ground - o.h) {
                    running = false;
                    playOver();
                    document.getElementById('final').innerText = score;
                    document.getElementById('over').style.display = 'flex';
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, W, H);

            // Ground
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, dragon.ground + dragon.r, W, H - dragon.ground - dragon.r);

            // Dragon
            ctx.fillStyle = '#228B22';
            ctx.beginPath();
            ctx.arc(dragon.x, dragon.y, dragon.r, 0, Math.PI * 2);
            ctx.fill();
            // Eye
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(dragon.x + 10, dragon.y - 5, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(dragon.x + 12, dragon.y - 5, 4, 0, Math.PI * 2);
            ctx.fill();
            // Horn
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.moveTo(dragon.x - 5, dragon.y - 20);
            ctx.lineTo(dragon.x + 5, dragon.y - 35);
            ctx.lineTo(dragon.x + 15, dragon.y - 20);
            ctx.fill();

            // Obstacles
            ctx.fillStyle = '#654321';
            for (const o of obstacles) {
                ctx.fillRect(o.x, dragon.ground + dragon.r - o.h, 30, o.h);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        dragon.ground = H - 100;
        dragon.y = dragon.ground;

        window.ontouchstart = (e) => { e.preventDefault(); jump(); };
        window.onmousedown = jump;
        window.onkeydown = (e) => { if (e.code === 'Space') jump(); };

        loop();
    </script>
</body>
</html>
