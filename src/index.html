<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>太空射击</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            touch-action: none;
            background: #0a0a1a;
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas { display: block; }
        #score {
            position: fixed;
            top: 15px;
            left: 20px;
            font-size: 24px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
            z-index: 10;
        }
        #health {
            position: fixed;
            top: 15px;
            right: 20px;
            font-size: 24px;
            color: #f00;
            text-shadow: 0 0 10px #f00;
            z-index: 10;
        }
        #start, #over {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.8);
            z-index: 20;
        }
        #over { display: none; }
        h1 { font-size: 42px; color: #0ff; text-shadow: 0 0 20px #0ff; margin-bottom: 15px; }
        p { font-size: 18px; color: #aaa; margin-bottom: 25px; }
        button {
            padding: 15px 50px;
            font-size: 22px;
            background: linear-gradient(180deg, #00ffff, #0088aa);
            border: none;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,255,255,0.5);
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="score">得分: 0</div>
    <div id="health">❤️❤️❤️</div>
    <div id="start">
        <h1>🚀 太空射击</h1>
        <p>拖动飞机移动，点击射击</p>
        <button onclick="start()">开始游戏</button>
    </div>
    <div id="over">
        <h1>游戏结束</h1>
        <p>最终得分: <span id="final">0</span></p>
        <button onclick="start()">重新开始</button>
    </div>
    <canvas id="c"></canvas>
    <script>
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        let W, H;

        function size() {
            W = c.width = window.innerWidth;
            H = c.height = window.innerHeight;
        }
        size();
        window.onresize = size;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playShoot() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playExplode() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function playHit() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        let running = false;
        let score = 0;
        let health = 3;
        let frame = 0;

        const player = { x: 0, y: 0, w: 50, h: 40 };
        const bullets = [];
        const enemies = [];
        const particles = [];
        const stars = [];

        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * W,
                y: Math.random() * H,
                s: Math.random() * 2 + 0.5,
                t: Math.random() * Math.PI * 2
            });
        }

        function reset() {
            player.x = W / 2;
            player.y = H - 100;
            bullets.length = 0;
            enemies.length = 0;
            particles.length = 0;
            score = 0;
            health = 3;
            frame = 0;
            updateUI();
        }

        function start() {
            document.getElementById('start').style.display = 'none';
            document.getElementById('over').style.display = 'none';
            if (audioCtx.state === 'suspended') audioCtx.resume();
            reset();
            running = true;
        }

        function updateUI() {
            document.getElementById('score').innerText = '得分: ' + score;
            document.getElementById('health').innerText = '❤️'.repeat(health);
        }

        let lastShoot = 0;
        function shoot() {
            if (!running) return;
            const now = Date.now();
            if (now - lastShoot < 150) return;
            lastShoot = now;
            bullets.push({ x: player.x, y: player.y - 20, v: -12 });
            playShoot();
        }

        function spawnEnemy() {
            enemies.push({
                x: Math.random() * (W - 40) + 20,
                y: -30,
                w: 40,
                h: 40,
                v: 2 + Math.random() * 2 + score * 0.01
            });
        }

        function createExplode(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 30,
                    color
                });
            }
        }

        let touchStartX = 0, touchStartY = 0;
        let isTouching = false;

        c.ontouchstart = (e) => {
            e.preventDefault();
            const t = e.touches[0];
            touchStartX = t.clientX;
            touchStartY = t.clientY;
            isTouching = true;
            if (t.clientY > H - 150) {
                player.x = t.clientX;
                player.y = Math.min(t.clientY, H - 60);
            }
        };

        c.ontouchmove = (e) => {
            e.preventDefault();
            if (!running) return;
            const t = e.touches[0];
            if (t.clientY > H - 150) {
                player.x = t.clientX;
                player.y = Math.min(t.clientY, H - 60);
            }
        };

        c.ontouchend = (e) => {
            e.preventDefault();
            if (isTouching && e.changedTouches[0].clientY < H - 150) {
                shoot();
            }
            isTouching = false;
        };

        c.onmousedown = (e) => {
            if (e.clientY > H - 150) {
                player.x = e.clientX;
            } else {
                shoot();
            }
        };

        c.onmousemove = (e) => {
            if (e.buttons === 1 && e.clientY > H - 150) {
                player.x = e.clientX;
            }
        };

        function update() {
            if (!running) return;
            frame++;

            if (frame % 60 === 0) spawnEnemy();

            bullets.forEach(b => b.y += b.v);
            bullets.forEach((b, i) => {
                if (b.y < -20) bullets.splice(i, 1);
            });

            enemies.forEach(e => e.y += e.v);

            // Bullet hits enemy
            bullets.forEach((b, bi) => {
                enemies.forEach((e, ei) => {
                    if (b.x > e.x - e.w/2 && b.x < e.x + e.w/2 &&
                        b.y > e.y - e.h/2 && b.y < e.y + e.h/2) {
                        bullets.splice(bi, 1);
                        enemies.splice(ei, 1);
                        score += 10;
                        createExplode(e.x, e.y, '#ff0');
                        playExplode();
                        updateUI();
                    }
                });
            });

            // Enemy hits player
            enemies.forEach((e, ei) => {
                if (e.y > H + 50) {
                    enemies.splice(ei, 1);
                } else if (e.y + e.h/2 > player.y - player.h/2 &&
                           e.x > player.x - player.w/2 &&
                           e.x < player.x + player.w/2) {
                    enemies.splice(ei, 1);
                    health--;
                    createExplode(player.x, player.y, '#f00');
                    playHit();
                    updateUI();

                    if (health <= 0) {
                        running = false;
                        document.getElementById('final').innerText = score;
                        document.getElementById('over').style.display = 'flex';
                    }
                }
            });

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
            });
            particles.forEach((p, i) => {
                if (p.life <= 0) particles.splice(i, 1);
            });
        }

        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, W, H);

            // Stars
            stars.forEach(s => {
                s.t += 0.02;
                const alpha = 0.5 + Math.sin(s.t) * 0.5;
                ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2);
                ctx.fill();
            });

            // Player
            const px = player.x, py = player.y;
            ctx.fillStyle = '#00aaff';
            ctx.beginPath();
            ctx.moveTo(px, py - 25);
            ctx.lineTo(px - 25, py + 15);
            ctx.lineTo(px - 10, py + 10);
            ctx.lineTo(px, py + 20);
            ctx.lineTo(px + 10, py + 10);
            ctx.lineTo(px + 25, py + 15);
            ctx.closePath();
            ctx.fill();

            // Cockpit
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.arc(px, py - 5, 8, 0, Math.PI * 2);
            ctx.fill();

            // Engine glow
            ctx.fillStyle = `rgba(255,100,0,${0.5 + Math.random() * 0.5})`;
            ctx.beginPath();
            ctx.moveTo(px - 8, py + 12);
            ctx.lineTo(px, py + 25 + Math.random() * 10);
            ctx.lineTo(px + 8, py + 12);
            ctx.fill();

            // Bullets
            ctx.fillStyle = '#ff0';
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
                ctx.fill();
            });

            // Enemies
            enemies.forEach(e => {
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.moveTo(e.x, e.y + 20);
                ctx.lineTo(e.x - 20, e.y - 10);
                ctx.lineTo(e.x, e.y - 20);
                ctx.lineTo(e.x + 20, e.y - 10);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#ff8888';
                ctx.beginPath();
                ctx.arc(e.x, e.y, 8, 0, Math.PI * 2);
                ctx.fill();
            });

            // Particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
