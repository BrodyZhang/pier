<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>跳跳龙</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            touch-action: none;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            font-family: 'Segoe UI', sans-serif;
        }
        canvas { display: block; }
        #score {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            color: #333;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
            z-index: 10;
        }
        #start-screen, #game-over {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.6);
            z-index: 20;
        }
        #game-over { display: none; }
        h1 { font-size: 48px; color: #FFD700; text-shadow: 3px 3px 6px #000; margin-bottom: 20px; }
        p { font-size: 18px; color: #fff; margin-bottom: 30px; }
        button {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            border-radius: 30px;
            color: #333;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="score">得分: 0</div>
    <div id="start-screen">
        <h1>🐉 跳跳龙</h1>
        <p>点击或触摸屏幕跳跃</p>
        <button onclick="startGame()">开始游戏</button>
    </div>
    <div id="game-over">
        <h1>游戏结束</h1>
        <p>最终得分: <span id="final-score">0</span></p>
        <button onclick="restartGame()">再玩一次</button>
    </div>
    <canvas id="game"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        let W, H;
        let gameRunning = false;
        let score = 0;
        let frame = 0;
        let speed = 4;

        const dragon = {
            x: 0, y: 0, width: 60, height: 60,
            vy: 0, gravity: 0.6, jump: -12,
            ground: 0, rotation: 0
        };

        const obstacles = [];
        const clouds = [];
        const stars = [];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            dragon.ground = H - 80;
            dragon.y = dragon.ground;
            dragon.x = W * 0.2;
        }

        function init() {
            dragon.y = dragon.ground;
            dragon.vy = 0;
            dragon.rotation = 0;
            obstacles.length = 0;
            score = 0;
            frame = 0;
            speed = 4;
            clouds.length = 0;
            stars.length = 0;

            for (let i = 0; i < 5; i++) {
                clouds.push({
                    x: Math.random() * W,
                    y: Math.random() * H * 0.4,
                    w: 80 + Math.random() * 60,
                    speed: 0.5 + Math.random() * 0.5
                });
            }

            for (let i = 0; i < 20; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H * 0.6,
                    size: 2 + Math.random() * 3,
                    blink: Math.random() * Math.PI * 2
                });
            }

            document.getElementById('score').textContent = '得分: 0';
        }

        function drawDragon(x, y, rotation) {
            ctx.save();
            ctx.translate(x + dragon.width/2, y + dragon.height/2);
            ctx.rotate(rotation);

            // Body
            ctx.fillStyle = '#4CAF50';
            ctx.beginPath();
            ctx.ellipse(0, 0, 30, 20, 0, 0, Math.PI * 2);
            ctx.fill();

            // Head
            ctx.fillStyle = '#45a049';
            ctx.beginPath();
            ctx.arc(20, -5, 15, 0, Math.PI * 2);
            ctx.fill();

            // Eye
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(25, -8, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(27, -8, 3, 0, Math.PI * 2);
            ctx.fill();

            // Spikes
            ctx.fillStyle = '#2E7D32';
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(-20 + i * 15, -15);
                ctx.lineTo(-15 + i * 15, -25);
                ctx.lineTo(-10 + i * 15, -15);
                ctx.fill();
            }

            // Wing
            ctx.fillStyle = '#81C784';
            const wingFlap = Math.sin(frame * 0.3) * 15;
            ctx.beginPath();
            ctx.moveTo(-5, 0);
            ctx.lineTo(-20, -15 + wingFlap);
            ctx.lineTo(-10, 0);
            ctx.fill();

            // Tail
            ctx.strokeStyle = '#4CAF50';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(-25, 5);
            ctx.quadraticCurveTo(-40, 0, -45, -10);
            ctx.stroke();

            // Legs
            ctx.fillStyle = '#388E3C';
            const legOffset = Math.sin(frame * 0.5) * 5;
            ctx.beginPath();
            ctx.arc(10, 15 + legOffset, 5, 0, Math.PI * 2);
            ctx.arc(-10, 15 - legOffset, 5, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawObstacle(o) {
            ctx.fillStyle = '#8D6E63';
            ctx.beginPath();
            ctx.moveTo(o.x, o.y);
            ctx.lineTo(o.x + 15, o.y - o.height);
            ctx.lineTo(o.x + 30, o.y);
            ctx.fill();

            // Cactus details
            ctx.fillStyle = '#6D4C41';
            ctx.fillRect(o.x + 5, o.y - o.height + 10, 8, 15);
            ctx.fillRect(o.x + 18, o.y - o.height + 5, 6, 12);
        }

        function drawCloud(c) {
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.beginPath();
            ctx.arc(c.x, c.y, 30, 0, Math.PI * 2);
            ctx.arc(c.x + 25, c.y - 10, 25, 0, Math.PI * 2);
            ctx.arc(c.x + 50, c.y, 30, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawGround() {
            ctx.fillStyle = '#DEB887';
            ctx.fillRect(0, H - 50, W, 50);

            ctx.fillStyle = '#D2691E';
            ctx.fillRect(0, H - 50, W, 5);

            // Sand dots
            for (let i = 0; i < W; i += 30) {
                ctx.fillStyle = 'rgba(139,69,19,0.3)';
                ctx.beginPath();
                ctx.arc(i + Math.sin(i)*10, H - 30, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function update() {
            if (!gameRunning) return;

            frame++;

            // Dragon physics
            dragon.vy += dragon.gravity;
            dragon.y += dragon.vy;

            if (dragon.y > dragon.ground) {
                dragon.y = dragon.ground;
                dragon.vy = 0;
                dragon.rotation = 0;
            } else {
                dragon.rotation = Math.min(Math.PI / 6, dragon.vy * 0.05);
            }

            // Obstacles
            if (frame % 120 === 0) {
                obstacles.push({
                    x: W + 50,
                    y: dragon.ground,
                    height: 40 + Math.random() * 40
                });
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i];
                o.x -= speed;

                if (o.x < -50) {
                    obstacles.splice(i, 1);
                    score++;
                    document.getElementById('score').textContent = '得分: ' + score;
                    if (score % 5 === 0) speed += 0.5;
                }

                // Collision
                if (
                    dragon.x + 20 < o.x + 30 &&
                    dragon.x + dragon.width - 20 > o.x + 5 &&
                    dragon.y + dragon.height > o.y - o.height
                ) {
                    gameOver();
                }
            }

            // Clouds
            for (const c of clouds) {
                c.x -= c.speed;
                if (c.x < -100) c.x = W + 100;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            // Background
            for (const s of stars) {
                ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(s.blink + frame * 0.05) * 0.3})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            }

            for (const c of clouds) drawCloud(c);
            drawGround();

            for (const o of obstacles) drawObstacle(o);

            drawDragon(dragon.x, dragon.y, dragon.rotation);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function jump() {
            if (!gameRunning) return;
            if (dragon.y >= dragon.ground - 5) {
                dragon.vy = dragon.jump;
            }
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameRunning = true;
            init();
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').style.display = 'flex';
        }

        function restartGame() {
            document.getElementById('game-over').style.display = 'none';
            gameRunning = true;
            init();
        }

        window.addEventListener('resize', resize);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        window.addEventListener('mousedown', jump);
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(); });

        resize();
        init();
        loop();
    </script>
</body>
</html>
