<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>飞机大战 - 太空射击</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    touch-action: none;
}
canvas {
    display: block;
    border: 2px solid rgba(100,150,255,0.3);
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(50,100,255,0.2);
    max-width: 100vw;
    max-height: 100vh;
}
#ui {
    position: absolute;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    display: flex;
    justify-content: space-between;
    padding: 12px 20px;
    color: #fff;
    font-size: 16px;
    text-shadow: 0 0 10px rgba(0,100,255,0.5);
}
#gameOver, #winScreen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.7);
    color: #fff;
    z-index: 10;
}
#gameOver h1, #winScreen h1 { font-size: 42px; margin-bottom: 16px; }
#gameOver h1 { color: #ff4444; }
#winScreen h1 { color: #ffdd00; }
#gameOver p, #winScreen p { font-size: 18px; margin-bottom: 20px; color: rgba(255,255,255,0.7); }
#gameOver button, #winScreen button {
    pointer-events: auto;
    padding: 12px 40px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #4488ff, #6644ff);
    color: #fff;
    cursor: pointer;
    font-family: inherit;
}
#gameOver button:hover, #winScreen button:hover { transform: scale(1.05); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
    <span>💥 <span id="score">0</span></span>
    <span>❤️ x<span id="lives">3</span></span>
    <span>关卡 <span id="level">1</span></span>
</div>
<div id="gameOver">
    <h1>💥 坠毁了</h1>
    <p>得分: <span id="finalScore">0</span></p>
    <button onclick="restart()">重新开始</button>
</div>
<div id="winScreen">
    <h1>🎉 通关！</h1>
    <p>得分: <span id="winScore">0</span></p>
    <button onclick="restart()">再来一次</button>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 480, H = 700;
canvas.width = W;
canvas.height = H;

let player, bullets, enemies, stars, particles, boss, bossBullets;
let score, lives, level, gameRunning, frameCount;
let keys = {};
let comboCount = 0, comboTimer = 0;
let lastTransitionFrame = -200; // prevent rapid level advances

const LEVEL_BOSS = 3;
const MAX_LEVEL = 3;

function init() {
    player = { x: W/2, y: H-80, w: 36, h: 40, speed: 4, cooldown: 0, invincible: 0 };
    bullets = [];
    enemies = [];
    stars = [];
    particles = [];
    boss = null;
    bossBullets = [];
    score = 0;
    lives = 3;
    level = 1;
    gameRunning = true;
    frameCount = 0;
    comboCount = 0;
    comboTimer = 0;
    lastTransitionFrame = -200;
    
    for (let i = 0; i < 80; i++) {
        stars.push({
            x: Math.random() * W, y: Math.random() * H,
            size: 0.5 + Math.random() * 1.5, speed: 0.3 + Math.random() * 0.7,
            brightness: 0.3 + Math.random() * 0.7
        });
    }
    
    document.getElementById('gameOver').style.display = 'none';
    document.getElementById('winScreen').style.display = 'none';
    updateUI();
}

function spawnLevel() {
    enemies = [];
    boss = null;
    bossBullets = [];
    
    if (level === 1) {
        spawnWave(6, 1.0);
    } else if (level === 2) {
        spawnWave(10, 1.5);
    } else if (level === 3) {
        boss = {
            x: W/2, y: -80, w: 70, h: 60,
            hp: 15, maxHp: 15, speed: 1.0,
            direction: 1, shootTimer: 0,
            phase: 0, phaseTimer: 0
        };
    }
}

function spawnWave(count, speed) {
    const spawnLevel = level; // capture level at spawn time
    for (let i = 0; i < count; i++) {
        setTimeout(() => {
            if (!gameRunning || level !== spawnLevel) return;
            enemies.push({
                x: 40 + Math.random() * (W - 80),
                y: -30,
                w: 28, h: 28,
                speed: 0.5 + speed * (0.5 + Math.random() * 0.5),
                hp: 1,
                type: Math.random() < 0.3 ? 'tough' : 'normal'
            });
        }, i * 400);
    }
}

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 30 + Math.random() * 20,
            maxLife: 50,
            size: 2 + Math.random() * 3,
            color
        });
    }
}

function drawPlayer() {
    const p = player;
    if (!p) return;
    ctx.save();
    ctx.translate(p.x, p.y);
    if (p.invincible > 0 && Math.floor(p.invincible / 4) % 2 === 0) {
        ctx.globalAlpha = 0.4;
    }
    ctx.shadowColor = '#4488ff';
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#4488ff';
    ctx.beginPath();
    ctx.moveTo(0, -p.h/2);
    ctx.lineTo(-p.w/2, p.h/3);
    ctx.lineTo(-p.w/4, p.h/2);
    ctx.lineTo(0, p.h/3);
    ctx.lineTo(p.w/4, p.h/2);
    ctx.lineTo(p.w/2, p.h/3);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#66ccff';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.ellipse(0, -p.h/6, p.w/5, p.h/5, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#3366cc';
    ctx.shadowBlur = 5;
    ctx.beginPath();
    ctx.moveTo(-p.w/2, p.h/8);
    ctx.lineTo(-p.w*0.8, p.h/3);
    ctx.lineTo(-p.w/2, p.h/4);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(p.w/2, p.h/8);
    ctx.lineTo(p.w*0.8, p.h/3);
    ctx.lineTo(p.w/2, p.h/4);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 20;
    const grad = ctx.createRadialGradient(0, p.h/2.5, 2, 0, p.h/2.5, 12);
    grad.addColorStop(0, 'rgba(100,200,255,0.8)');
    grad.addColorStop(1, 'rgba(100,200,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, p.h/2.5, 12, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
}

function drawEnemy(e) {
    if (!e) return;
        ctx.save();
        ctx.translate(e.x, e.y);
    
    if (boss) {
        // Boss is drawn separately
        ctx.restore();
        return;
    }
    
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 8;
    
    if (e.type === 'tough') {
        ctx.fillStyle = '#ff6644';
        ctx.beginPath();
        ctx.moveTo(0, -e.h/2);
        ctx.lineTo(-e.w/2, e.h/4);
        ctx.lineTo(-e.w/3, e.h/2);
        ctx.lineTo(0, e.h/3);
        ctx.lineTo(e.w/3, e.h/2);
        ctx.lineTo(e.w/2, e.h/4);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#ffaa44';
        ctx.beginPath();
        ctx.arc(0, 0, e.w/5, 0, Math.PI*2);
        ctx.fill();
    } else {
        ctx.fillStyle = '#ff3333';
        ctx.beginPath();
        ctx.moveTo(0, e.h/2);
        ctx.lineTo(-e.w/2, -e.h/4);
        ctx.lineTo(-e.w/4, -e.h/2);
        ctx.lineTo(0, -e.h/4);
        ctx.lineTo(e.w/4, -e.h/2);
        ctx.lineTo(e.w/2, -e.h/4);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#ff8844';
        ctx.beginPath();
        ctx.arc(0, 0, e.w/6, 0, Math.PI*2);
        ctx.fill();
    }
    
    ctx.restore();
}

function drawBoss() {
    if (!boss) return;
    const b = boss;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.shadowColor = '#ff2200';
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#cc2244';
    ctx.beginPath();
    ctx.moveTo(0, -b.h/2);
    ctx.lineTo(-b.w/2, b.h/3);
    ctx.lineTo(-b.w/1.5, b.h/2.5);
    ctx.lineTo(-b.w/3, b.h/2);
    ctx.lineTo(0, b.h/3);
    ctx.lineTo(b.w/3, b.h/2);
    ctx.lineTo(b.w/1.5, b.h/2.5);
    ctx.lineTo(b.w/2, b.h/3);
    ctx.closePath();
    ctx.fill();
    ctx.shadowColor = '#ff6600';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(0, 0, b.w/4, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ffff00';
    ctx.shadowColor = '#ffff00';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(0, -b.h/6, b.w/8, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(-b.w/2, -b.h/2 - 12, b.w, 6);
    const hpRatio = b.hp / b.maxHp;
    ctx.fillStyle = hpRatio > 0.5 ? '#44ff44' : hpRatio > 0.25 ? '#ffaa00' : '#ff4444';
    ctx.fillRect(-b.w/2, -b.h/2 - 12, b.w * hpRatio, 6);
    ctx.restore();
}

function updatePlayer() {
    if (!player) return;
    const p = player;
    if (p.invincible > 0) p.invincible--;
    if (p.cooldown > 0) p.cooldown--;
    
    let dx = 0, dy = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) dx = -1;
    if (keys['ArrowRight'] || keys['KeyD']) dx = 1;
    if (keys['ArrowUp'] || keys['KeyW']) dy = -1;
    if (keys['ArrowDown'] || keys['KeyS']) dy = 1;
    
    if (dx && dy) {
        dx *= 0.707;
        dy *= 0.707;
    }
    
    p.x += dx * p.speed;
    p.y += dy * p.speed;
    p.x = Math.max(p.w/2, Math.min(W - p.w/2, p.x));
    p.y = Math.max(p.h/2, Math.min(H - p.h/2, p.y));
    
    // Auto-fire
    if (p.cooldown === 0) {
        bullets.push({ x: p.x, y: p.y - p.h/2, w: 4, h: 12, speed: 7, damage: 1 });
        bullets.push({ x: p.x - 8, y: p.y - p.h/3, w: 3, h: 10, speed: 6, damage: 1 });
        bullets.push({ x: p.x + 8, y: p.y - p.h/3, w: 3, h: 10, speed: 6, damage: 1 });
        p.cooldown = 8;
    }
}

function updateEnemies() {
    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.y += e.speed;
        
        // Enemy shoots randomly
        if (Math.random() < 0.003) {
            bossBullets.push({ x: e.x, y: e.y + e.h/2, w: 4, h: 4, speed: 2.5 });
        }
        
        if (e.y > H + 30) {
            enemies.splice(i, 1);
        }
    }
    
    // Check wave cleared for levels 1-2 (with guard against rapid re-trigger)
    if (level < LEVEL_BOSS && enemies.length === 0 && !boss && frameCount - lastTransitionFrame > 120) {
        lastTransitionFrame = frameCount;
        if (level === 1) {
            level = 2;
            updateUI();
            setTimeout(() => spawnLevel(), 1000);
        } else if (level === 2) {
            level = 3;
            updateUI();
            setTimeout(() => spawnLevel(), 1000);
        }
    }
}

function updateBoss() {
    if (!boss) return;
    const b = boss;
    
    // Enter from top
    if (b.y < 80) {
        b.y += 1.5;
        return;
    }
    
    // Move side to side
    b.x += b.speed * b.direction;
    if (b.x > W - b.w/2) b.direction = -1;
    if (b.x < b.w/2) b.direction = 1;
    
    // Shoot patterns
    b.shootTimer++;
    if (b.shootTimer > 30) {
        b.shootTimer = 0;
        // Spread shot
        for (let angle = -30; angle <= 30; angle += 15) {
            const rad = angle * Math.PI / 180;
            bossBullets.push({
                x: b.x, y: b.y + b.h/3,
                w: 6, h: 6,
                speed: 2.5,
                vx: Math.sin(rad) * 2.5,
                vy: Math.cos(rad) * 2.5
            });
        }
    }
}

function updateBullets() {
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.y -= b.speed;
        if (b.y < -10) { bullets.splice(i, 1); continue; }
        
        // Hit enemies
        if (!boss) {
            for (let j = enemies.length - 1; j >= 0; j--) {
                const e = enemies[j];
                if (b.x > e.x - e.w/2 && b.x < e.x + e.w/2 &&
                    b.y > e.y - e.h/2 && b.y < e.y + e.h/2) {
                    e.hp--;
                    if (e.hp <= 0) {
                        spawnParticles(e.x, e.y, '#ff6644', 12);
                        enemies.splice(j, 1);
                        score += e.type === 'tough' ? 30 : 10;
                        updateUI();
                    }
                    bullets.splice(i, 1);
                    break;
                }
            }
        }
        
        // Hit boss
        if (boss && b.x > boss.x - boss.w/2 && b.x < boss.x + boss.w/2 &&
            b.y > boss.y - boss.h/2 && b.y < boss.y + boss.h/2) {
            boss.hp--;
            spawnParticles(b.x, b.y, '#ff8844', 3);
            score += 5;
            updateUI();
            bullets.splice(i, 1);
            
            if (boss.hp <= 0) {
                spawnParticles(boss.x, boss.y, '#ff4444', 40);
                spawnParticles(boss.x, boss.y, '#ffaa00', 30);
                spawnParticles(boss.x, boss.y, '#ffff00', 20);
                boss = null;
                score += 200;
                updateUI();
                win();
            }
        }
    }
}

function updateBossBullets() {
    for (let i = bossBullets.length - 1; i >= 0; i--) {
        const b = bossBullets[i];
        if (b.vx !== undefined) {
            b.x += b.vx;
            b.y += b.vy;
        } else {
            b.y += b.speed;
        }
        
        if (b.y > H + 10 || b.x < -10 || b.x > W + 10) {
            bossBullets.splice(i, 1);
            continue;
        }
        
        // Hit player
        if (player.invincible === 0 &&
            b.x > player.x - player.w/2 && b.x < player.x + player.w/2 &&
            b.y > player.y - player.h/2 && b.y < player.y + player.h/2) {
            hitPlayer();
            bossBullets.splice(i, 1);
        }
    }
}

function checkEnemyCollision() {
    if (player.invincible > 0) return;
    for (const e of enemies) {
        if (player.x > e.x - e.w/2 - player.w/2 && player.x < e.x + e.w/2 + player.w/2 &&
            player.y > e.y - e.h/2 - player.h/2 && player.y < e.y + e.h/2 + player.h/2) {
            hitPlayer();
            spawnParticles(e.x, e.y, '#ff4444', 10);
            enemies.splice(enemies.indexOf(e), 1);
            break;
        }
    }
}

function hitPlayer() {
    lives--;
    player.invincible = 60;
    spawnParticles(player.x, player.y, '#4488ff', 15);
    updateUI();
    if (lives <= 0) {
        gameOver();
    }
}

function gameOver() {
    gameRunning = false;
    document.getElementById('finalScore').textContent = score;
    document.getElementById('gameOver').style.display = 'flex';
}

function win() {
    gameRunning = false;
    document.getElementById('winScore').textContent = score;
    document.getElementById('winScreen').style.display = 'flex';
}

function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('lives').textContent = lives;
    document.getElementById('level').textContent = level;
}

function restart() {
    init();
    spawnLevel();
}

function drawStars() {
    for (const s of stars) {
        ctx.fillStyle = `rgba(255,255,255,${s.brightness})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
        s.y += s.speed;
        if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    }
}

function drawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
        ctx.fill();
        if (p.life <= 0) particles.splice(i, 1);
    }
    ctx.globalAlpha = 1;
}

function drawBullets() {
    ctx.shadowColor = '#66ddff';
    ctx.shadowBlur = 10;
    for (const b of bullets) {
        ctx.fillStyle = '#66ddff';
        ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
        ctx.fillStyle = 'rgba(150,230,255,0.4)';
        ctx.fillRect(b.x - b.w/2 - 1, b.y - b.h/2 - 2, b.w + 2, b.h + 4);
    }
    ctx.shadowBlur = 0;
}

function drawBossBullets() {
    for (const b of bossBullets) {
        ctx.shadowColor = '#ff4444';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#ff4444';
        ctx.beginPath();
        ctx.arc(b.x, b.y, Math.max(b.w, b.h) / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,150,100,0.4)';
        ctx.beginPath();
        ctx.arc(b.x, b.y, Math.max(b.w, b.h) / 2 + 2, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.shadowBlur = 0;
}

function gameLoop() {
    try {
        if (!gameRunning) {
            drawStars();
            drawParticles();
            requestAnimationFrame(gameLoop);
            return;
        }
        
        frameCount++;
        
        // Update
        updatePlayer();
        updateEnemies();
        updateBoss();
        updateBullets();
        updateBossBullets();
        checkEnemyCollision();
        
        // Draw - reset canvas state to prevent ghosting
        ctx.save();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, W, H);
        ctx.restore();
        ctx.shadowBlur = 0;
        ctx.shadowColor = 'transparent';
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#0a0a2e';
        ctx.fillRect(0, 0, W, H);
        
        drawStars();
        drawBullets();
        drawBossBullets();
        
        for (const e of enemies) { if (e) drawEnemy(e); }
        drawBoss();
        if (player) drawPlayer();
        drawParticles();
    } catch(e) {
        console.error('Game error:', e);
    }
    requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','KeyW','KeyA','KeyS','KeyD'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Ensure canvas captures keyboard focus on desktop
canvas.setAttribute('tabindex', '0');
canvas.focus();

// Touch controls
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const tx = (t.clientX - rect.left) * scaleX;
    const ty = (t.clientY - rect.top) * scaleY;
    // Move toward touch point
    const dx = tx - player.x;
    const dy = ty - player.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 10) {
        keys['ArrowRight'] = dx > 0;
        keys['ArrowLeft'] = dx < 0;
        keys['ArrowDown'] = dy > 0;
        keys['ArrowUp'] = dy < 0;
    }
});
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const tx = (t.clientX - rect.left) * scaleX;
    const ty = (t.clientY - rect.top) * scaleY;
    const dx = tx - player.x;
    const dy = ty - player.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 10) {
        keys['ArrowRight'] = dx > 0;
        keys['ArrowLeft'] = dx < 0;
        keys['ArrowDown'] = dy > 0;
        keys['ArrowUp'] = dy < 0;
    }
});
canvas.addEventListener('touchend', e => {
    e.preventDefault();
    keys['ArrowRight'] = false;
    keys['ArrowLeft'] = false;
    keys['ArrowUp'] = false;
    keys['ArrowDown'] = false;
});

init();
spawnLevel();
canvas.focus();
gameLoop();
</script>
</body>
</html>
