name: Deploy Prod

on:
  push:
    branches: [master]
    paths: ['PROD_VERSION']
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read PROD_VERSION
        id: version
        run: |
          VER=$(cat PROD_VERSION | tr -d ' \n\r')
          echo "VERSION=$VER" >> $GITHUB_OUTPUT
          echo "Found version: $VER"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Promote prod on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            PIER_DIR=~/pier
            cd "$PIER_DIR"

            echo "=== Pulling repo ==="
            git pull origin master 2>&1

            PROD_VER="${{ steps.version.outputs.VERSION }}"
            echo "=== Promoting prod to $PROD_VER ==="

            # Login to Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

            # Write new PROD_VERSION to .env
            if grep -q '^PROD_VERSION=' .env; then
              sed -i "s/^PROD_VERSION=.*/PROD_VERSION=$PROD_VER/" .env
            else
              echo "PROD_VERSION=$PROD_VER" >> .env
            fi

            echo "=== .env contents ==="
            cat .env

            echo "=== Pulling app-prod ==="
            docker compose pull app-prod

            echo "=== Restarting app-prod ==="
            docker compose down app-prod
            docker compose up -d app-prod

            echo "=== Waiting for container to start ==="
            sleep 5
            CONTAINER_STATUS=$(docker inspect --format='{{.State.Status}}' pier-app-prod-1 2>/dev/null || echo "missing")
            echo "Container status: $CONTAINER_STATUS"
            if [ "$CONTAINER_STATUS" != "running" ]; then
              echo "=== Container failed to start! Logs: ==="
              docker logs pier-app-prod-1 --tail 20
              exit 1
            fi

            echo "=== Prod promoted to $PROD_VER ==="

      - name: Verify prod
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            sleep 10
            echo "=== Container status ==="
            docker compose ps
            echo "=== app-prod logs ==="
            docker logs pier-app-prod-1 --tail 3
            echo "=== Checking HTTPS ==="
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://ailaopo.online/)
            echo "HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" != "200" ]; then
              echo "ERROR: prod returned $HTTP_CODE, expected 200"
              docker logs pier-app-prod-1 --tail 20
              exit 1
            fi
            echo "=== Prod verified OK ==="
