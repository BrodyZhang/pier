name: Deploy Prod

on:
  push:
    branches: [master]
    paths: ['PROD_VERSION']
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read PROD_VERSION
        id: version
        run: |
          VER=$(cat PROD_VERSION | tr -d ' \n\r')
          echo "VERSION=$VER" >> $GITHUB_OUTPUT
          echo "Found version: $VER"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Promote prod on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -x
            PIER_DIR=~/pier
            cd "$PIER_DIR" || echo "WARN: ~/pier not found"

            echo "=== Pulling repo ==="
            git pull origin master 2>&1 || echo "WARN: git pull failed"

            # Read version from the file in the repo
            PROD_VER="${{ steps.version.outputs.VERSION }}"

            echo "=== Promoting prod to $PROD_VER ==="

            # Login to Docker Hub first
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin 2>&1 || echo "WARN: docker login failed"

            # Write new PROD_VERSION to .env
            if grep -q '^PROD_VERSION=' .env; then
              sed -i "s/^PROD_VERSION=.*/PROD_VERSION=$PROD_VER/" .env
            else
              echo "PROD_VERSION=$PROD_VER" >> .env
            fi

            echo "=== .env contents ==="
            cat .env 2>&1 || echo "WARN: no .env"

            echo "=== Pulling app-prod ==="
            docker compose pull app-prod 2>&1 || echo "WARN: pull failed"

            echo "=== Restarting app-prod ==="
            docker compose down app-prod 2>&1 || true
            docker compose up -d app-prod 2>&1 || echo "WARN: up failed"

            echo "=== Container status ==="
            docker compose ps 2>&1 || true

            echo "=== app-prod logs ==="
            docker logs pier-app-prod-1 --tail 5 2>&1 || true

            # Clean up old images
            docker image prune -f 2>&1 || true

            echo "=== Prod promoted to $PROD_VER ==="

      - name: Verify prod
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 10
            cd ~/pier && docker compose ps
            echo "---"
            echo "Checking app-prod logs..."
            docker logs pier-app-prod-1 --tail 3
            echo "---"
            echo "Checking HTTPS..."
            curl -s -o /dev/null -w "HTTP %{http_code}" https://ailaopo.online/ || echo " (check failed)"
