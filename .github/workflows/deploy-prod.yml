name: Deploy Prod

on:
  push:
    branches: [master]
    paths: ['PROD_VERSION']
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read PROD_VERSION
        id: version
        run: |
          VER=$(cat PROD_VERSION | tr -d ' \n\r')
          echo "VERSION=$VER" >> $GITHUB_OUTPUT
          echo "Found version: $VER"

      - name: Promote prod on VPS
        shell: bash
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$SSH_KEY" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          trap 'rm -f /tmp/ssh_key' EXIT

          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key \
            "${VPS_USER}@${VPS_HOST}" \
            "DOCKER_USERNAME='${DOCKER_USERNAME}' DOCKER_PASSWORD='${DOCKER_PASSWORD}' PROD_VER='${{ steps.version.outputs.VERSION }}' bash -s" << 'EOSH'
            set -e
            PIER_DIR=~/pier
            cd "$PIER_DIR"

            echo "=== Promoting prod to ${PROD_VER} ==="
            echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin

            # Write new PROD_VERSION to .env
            if grep -q '^PROD_VERSION=' .env; then
              sed -i "s/^PROD_VERSION=.*/PROD_VERSION=${PROD_VER}/" .env
            else
              echo "PROD_VERSION=${PROD_VER}" >> .env
            fi

            echo "=== Pulling app-prod ==="
            docker compose pull app-prod

            echo "=== Restarting app-prod ==="
            docker compose down app-prod 2>/dev/null || true
            docker compose up -d app-prod

            echo "=== Waiting for container ==="
            for i in 1 2 3 4 5 6; do
              sleep 5
              STATUS=$(docker inspect --format='{{.State.Status}}' pier-app-prod-1 2>/dev/null || echo "missing")
              echo "Attempt $i: container status: $STATUS"
              if [ "$STATUS" = "running" ]; then
                echo "Container is running!"
                break
              fi
              if [ "$STATUS" = "missing" ] || [ "$STATUS" = "exited" ]; then
                echo "=== Container failed! Logs: ==="
                docker logs pier-app-prod-1 --tail 20 2>/dev/null || true
                exit 1
              fi
            done
          EOSH

      - name: Verify prod
        shell: bash
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          trap 'rm -f /tmp/ssh_key' EXIT

          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key \
            "${VPS_USER}@${VPS_HOST}" << 'EOSH'
            set -e
            echo "=== Container status ==="
            docker compose ps

            echo "=== Checking HTTPS (with retries) ==="
            for i in 1 2 3 4 5 6; do
              sleep 5
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://ailaopo.online/ 2>/dev/null || echo "FAIL")
              echo "Attempt $i: HTTP $HTTP_CODE"
              if [ "$HTTP_CODE" = "200" ]; then
                echo "=== Prod verified OK ==="
                exit 0
              fi
            done

            echo "=== Prod failed to respond with 200 ==="
            docker logs pier-app-prod-1 --tail 20 2>/dev/null || true
            exit 1
          EOSH
