name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get version
        id: version
        run: echo "VERSION=$(date +%Y%m%d)-$(printf "%08d" ${{ github.run_number }})" >> $GITHUB_OUTPUT

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pier:latest
            ${{ secrets.DOCKER_USERNAME }}/pier:${{ steps.version.outputs.VERSION }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Clone or update repo
            PIER_DIR=~/pier
            if [ ! -d "$PIER_DIR" ]; then
              git clone https://github.com/BrodyZhang/pier "$PIER_DIR"
            fi

            cd "$PIER_DIR"
            git pull origin master

            # Create/update .env with secrets
            cat > .env << ENVEOF
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            SMTP_FROM=${{ secrets.SMTP_FROM }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            DEV_API_KEY=${{ secrets.DEV_API_KEY }}
            PROD_VERSION=${{ vars.PROD_VERSION || 'latest' }}
            ENVEOF

            # Stop old containers from previous architecture (cleanup)
            docker stop pier-app-1 2>/dev/null || true
            docker rm pier-app-1 2>/dev/null || true

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

            # Build router image (local, nginx config from repo)
            docker compose build router

            # Pull only test image — prod is NEVER touched by push deploy
            docker compose pull app-test

            # Restart test + router + db. app-prod stays untouched.
            docker compose up -d router app-test db

      - name: Verify container status
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 10
            cd ~/pier && docker compose ps
            echo "---"
            echo "Checking router (port 80)..."
            curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:80/ || echo " (unreachable)"
            echo ""
            echo "Checking app-test logs (last 3 lines)..."
            docker logs pier-app-test-1 --tail 3 2>/dev/null || echo "no logs"
            echo "Prod was NOT restarted (unchanged)."
            docker logs pier-app-prod-1 --tail 1 2>/dev/null || echo "app-prod not running"

      - name: Smoke test (external)
        run: |
          sleep 5
          echo "Checking test.ailaopo.online..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 http://test.ailaopo.online/ || echo "DNS_FAIL")
          echo "HTTP $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "301" ]; then
            echo "SUCCESS: test domain responding"
          else
            echo "NOTE: test domain not responding yet (DNS propagation? container crash?)"
          fi
