name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/pier:latest

  restart-vps-container:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Restart container on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            docker pull ${{ secrets.DOCKER_USERNAME }}/pier:latest
            docker stop pier || true
            docker rm pier || true
            
            # Create cert volume if not exists
            docker volume create pier-cert || true
            
            # Run certbot to get certificate (run once only)
            docker run --rm -v pier-cert:/etc/letsencrypt \
              -p 80:80 \
              alpine certbot certonly --webroot -w /usr/share/nginx/html \
              --email 296068994@qq.com \
              --agree-tos --no-eff-email \
              -d ailaopo.online -d www.ailaopo.online \
              || echo "Certificate already exists or error"
            
            # Start container with certificate volume
            docker run -d -p 80:80 -p 443:443 \
              -v pier-cert:/etc/letsencrypt \
              --name pier ${{ secrets.DOCKER_USERNAME }}/pier:latest