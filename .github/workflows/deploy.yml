name: Deploy to VPS

on:
  push:
    branches:
      - master
    paths:
      - 'app/**'
      - 'nginx/**'
      - 'Dockerfile'
      - 'Dockerfile.router'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
  SMTP_HOST: ${{ secrets.SMTP_HOST }}
  SMTP_PORT: ${{ secrets.SMTP_PORT }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}
  SMTP_FROM: ${{ secrets.SMTP_FROM }}
  ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
  DEV_API_KEY: ${{ secrets.DEV_API_KEY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get version
        id: version
        run: echo "VERSION=v$(date +%Y%m%d)-$(printf "%08d" ${{ github.run_number }})" >> $GITHUB_OUTPUT

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pier:latest
            ${{ secrets.DOCKER_USERNAME }}/pier:${{ steps.version.outputs.VERSION }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        shell: bash
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # Write SSH key to temp file
          echo "$SSH_KEY" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          trap 'rm -f /tmp/ssh_key' EXIT

          # Write .env with all secrets, scp to VPS
          cat > /tmp/pier.env << ENVEOF
          SESSION_SECRET=${SESSION_SECRET}
          SMTP_HOST=${SMTP_HOST}
          SMTP_PORT=${SMTP_PORT}
          SMTP_USER=${SMTP_USER}
          SMTP_PASS=${SMTP_PASS}
          SMTP_FROM=${SMTP_FROM}
          ADMIN_EMAIL=${ADMIN_EMAIL}
          DEV_API_KEY=${DEV_API_KEY}
          ENVEOF

          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key \
            /tmp/pier.env "${VPS_USER}@${VPS_HOST}:~/pier/.env"

          # Run deploy commands via SSH
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key \
            "${VPS_USER}@${VPS_HOST}" \
            "DOCKER_USERNAME='${DOCKER_USERNAME}' DOCKER_PASSWORD='${DOCKER_PASSWORD}' bash -s" << 'EOSH'
            set -e
            PIER_DIR=~/pier
            if [ ! -d "$PIER_DIR" ]; then
              git clone https://github.com/BrodyZhang/pier "$PIER_DIR"
            fi
            cd "$PIER_DIR"

            echo "=== Resetting to origin/master ==="
            git fetch origin
            git reset --hard origin/master
            git clean -fd || true

            echo "=== Docker login ==="
            echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin

            DC=""
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              DC="docker-compose"
            else
              echo "ERROR: no docker compose found" >&2
              exit 1
            fi
            echo "Using: ${DC}"

            echo "=== Building router ==="
            ${DC} build router

            echo "=== Pulling app-test ==="
            ${DC} pull app-test

            echo "=== Restarting app-test ==="
            ${DC} up -d app-test --no-deps

            echo "=== Restarting router ==="
            ${DC} up -d router --no-deps
          EOSH

      - name: Verify deployment
        if: success()
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 https://test.ailaopo.online/ || echo "FAIL")
          echo "test.ailaopo.online returned HTTP ${STATUS}"
          if [ "${STATUS}" = "200" ]; then
            echo "SUCCESS"
          else
            echo "NOTE: expected 200, got ${STATUS}"
          fi
