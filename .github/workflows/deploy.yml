name: Deploy to VPS

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'PROD_VERSION'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get version
        id: version
        run: echo "VERSION=v$(date +%Y%m%d)-$(printf "%08d" ${{ github.run_number }})" >> $GITHUB_OUTPUT

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pier:latest
            ${{ secrets.DOCKER_USERNAME }}/pier:${{ steps.version.outputs.VERSION }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Debug - check VPS hostname & connectivity
        run: |
          echo "Resolving VPS_HOST..."
          host '${{ secrets.VPS_HOST }}' 2>&1 || echo "host command failed"
          nslookup '${{ secrets.VPS_HOST }}' 2>&1 || echo "nslookup failed"
          echo "Testing TCP connectivity..."
          timeout 5 bash -c 'echo | nc -w 3 '${{ secrets.VPS_HOST }}' 22 && echo "SSH port OPEN" || echo "SSH port TIMEOUT/CLOSED"' || echo "nc failed"

      - name: Deploy to VPS
        shell: bash
        run: |
          cat > /tmp/ssh_key << 'KEYEOF'
${{ secrets.SSH_PRIVATE_KEY }}
KEYEOF
          chmod 600 /tmp/ssh_key
          trap 'rm -f /tmp/ssh_key' EXIT

          ssh -v -o StrictHostKeyChecking=no -i /tmp/ssh_key \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'echo SSH_OK' 2>&1

      - name: Verify container status
        shell: bash
        run: |
          SSH_KEY=$(mktemp)
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > "$SSH_KEY"
          chmod 600 "$SSH_KEY"
          trap 'rm -f "$SSH_KEY"' EXIT

          ssh -o StrictHostKeyChecking=no -i "$SSH_KEY" \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOSH'
            sleep 10
            cd ~/pier && docker compose ps
            echo "---"
            echo "Checking router (port 80)..."
            curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:80/ || echo " (unreachable)"
            echo ""
            echo "Checking app-test logs (last 3 lines)..."
            docker logs pier-app-test-1 --tail 3 2>/dev/null || echo "no logs"
            echo "Prod was NOT restarted (unchanged)."
            docker logs pier-app-prod-1 --tail 1 2>/dev/null || echo "app-prod not running"
          EOSH

      - name: Smoke test (external)
        run: |
          sleep 5
          echo "Checking test.ailaopo.online..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 http://test.ailaopo.online/ || echo "DNS_FAIL")
          echo "HTTP $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "301" ]; then
            echo "SUCCESS: test domain responding"
          else
            echo "NOTE: test domain not responding yet (DNS propagation? container crash?)"
          fi
