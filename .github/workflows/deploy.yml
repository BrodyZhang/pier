name: Deploy to VPS

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'PROD_VERSION'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get version
        id: version
        run: echo "VERSION=v$(date +%Y%m%d)-$(printf "%08d" ${{ github.run_number }})" >> $GITHUB_OUTPUT

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pier:latest
            ${{ secrets.DOCKER_USERNAME }}/pier:${{ steps.version.outputs.VERSION }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -ex
            PIER_DIR=~/pier
            if [ ! -d "$PIER_DIR" ]; then
              git clone https://github.com/BrodyZhang/pier "$PIER_DIR"
            fi

            cd "$PIER_DIR"

            echo "=== Resetting any local changes ==="
            git reset --hard HEAD 2>&1
            git clean -fd 2>&1 || true

            echo "=== Pulling repo ==="
            git pull origin master 2>&1

            # Create/update .env with secrets (quoted heredoc prevents bash reinterpretation of secrets)
            echo "=== Writing .env (static vars) ==="
            cat > .env << 'ENVEOF'
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            SMTP_FROM=${{ secrets.SMTP_FROM }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            DEV_API_KEY=${{ secrets.DEV_API_KEY }}
            ENVEOF
            echo "=== Writing PROD_VERSION (dynamic) ==="
            echo "PROD_VERSION=$(cat PROD_VERSION | tr -d ' \n\r' 2>/dev/null || echo "unknown")" >> .env

            # Stop old containers from previous architecture (cleanup)
            docker stop pier-app-1 2>/dev/null || true
            docker rm pier-app-1 2>/dev/null || true

            echo "=== Docker login ==="
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

            # Detect docker compose variant
            DC=""
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              DC="docker-compose"
            else
              echo "ERROR: neither 'docker compose' nor 'docker-compose' found" >&2
              exit 1
            fi
            echo "Using: $DC"

            # Build router image (local, nginx config from repo)
            echo "=== Building router ==="
            $DC build router

            # Pull only test image — prod is NEVER touched by push deploy
            echo "=== Pulling app-test ==="
            $DC pull app-test

            echo "=== Restarting services ==="
            $DC up -d router app-test db

      - name: Verify container status
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 10
            cd ~/pier && docker compose ps
            echo "---"
            echo "Checking router (port 80)..."
            curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:80/ || echo " (unreachable)"
            echo ""
            echo "Checking app-test logs (last 3 lines)..."
            docker logs pier-app-test-1 --tail 3 2>/dev/null || echo "no logs"
            echo "Prod was NOT restarted (unchanged)."
            docker logs pier-app-prod-1 --tail 1 2>/dev/null || echo "app-prod not running"

      - name: Smoke test (external)
        run: |
          sleep 5
          echo "Checking test.ailaopo.online..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 http://test.ailaopo.online/ || echo "DNS_FAIL")
          echo "HTTP $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "301" ]; then
            echo "SUCCESS: test domain responding"
          else
            echo "NOTE: test domain not responding yet (DNS propagation? container crash?)"
          fi
