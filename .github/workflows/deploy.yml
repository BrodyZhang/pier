name: Deploy to VPS

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'PROD_VERSION'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get version
        id: version
        run: echo "VERSION=v$(date +%Y%m%d)-$(printf "%08d" ${{ github.run_number }})" >> $GITHUB_OUTPUT

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pier:latest
            ${{ secrets.DOCKER_USERNAME }}/pier:${{ steps.version.outputs.VERSION }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy to VPS
        shell: bash
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

          # Run deploy script via SSH, capture output
          ssh -o ConnectTimeout=30 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'bash -s' << 'RSCRIPT' 2>&1 | tee /tmp/deploy.log
          set -x

          ok() { echo "[OK] $1"; }
          die() { echo "[FAIL] $1"; exit 1; }

          PIER_DIR=~/pier
          [ -d "$PIER_DIR" ] || git clone https://github.com/BrodyZhang/pier "$PIER_DIR"
          cd "$PIER_DIR" || die "cd failed"

          git reset --hard HEAD && ok "git reset" || die "git reset"
          git clean -fd 2>/dev/null; ok "git clean"

          git pull origin master && ok "git pull" || die "git pull"

          cat > .env << 'ENVEOF'
          SESSION_SECRET=${{ secrets.SESSION_SECRET }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          DEV_API_KEY=${{ secrets.DEV_API_KEY }}
          ENVEOF
          ok ".env written"
          echo "PROD_VERSION=$(cat PROD_VERSION | tr -d ' \n\r' 2>/dev/null || echo "unknown")" >> .env
          ok "PROD_VERSION written"

          docker stop pier-app-1 2>/dev/null; docker rm pier-app-1 2>/dev/null; ok "cleanup"

          echo "=== Docker login ==="
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin && ok "docker login" || die "docker login"

          DC=""
          if docker compose version >/dev/null 2>&1; then DC="docker compose"; ok "found docker compose"
          elif docker-compose version >/dev/null 2>&1; then DC="docker-compose"; ok "found docker-compose"
          else die "no docker compose"
          fi

          $DC build router && ok "router built" || die "router build"
          $DC pull app-test && ok "app-test pulled" || die "app-test pull"
          $DC up -d router app-test db && ok "services restarted" || die "services restart"
          RSCRIPT

          RC=${PIPESTATUS[0]}
          if [ "$RC" -ne 0 ]; then
            echo "::error title=Deploy Failed::exit code $RC"
            echo "--- Last 15 lines of deploy output ---"
            tail -15 /tmp/deploy.log
            echo "--- End ---"
            exit "$RC"
          fi
          echo "::notice::Deploy completed successfully"

      - name: Verify container status
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 10
            cd ~/pier && docker compose ps
            echo "---"
            echo "Checking router (port 80)..."
            curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:80/ || echo " (unreachable)"
            echo ""
            echo "Checking app-test logs (last 3 lines)..."
            docker logs pier-app-test-1 --tail 3 2>/dev/null || echo "no logs"
            echo "Prod was NOT restarted (unchanged)."
            docker logs pier-app-prod-1 --tail 1 2>/dev/null || echo "app-prod not running"

      - name: Smoke test (external)
        run: |
          sleep 5
          echo "Checking test.ailaopo.online..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 http://test.ailaopo.online/ || echo "DNS_FAIL")
          echo "HTTP $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "301" ]; then
            echo "SUCCESS: test domain responding"
          else
            echo "NOTE: test domain not responding yet (DNS propagation? container crash?)"
          fi
