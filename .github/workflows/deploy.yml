name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get version
        id: version
        run: echo "VERSION=$(date +%Y%m%d)-$(printf "%08d" ${{ github.run_number }})" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pier:latest
            ${{ secrets.DOCKER_USERNAME }}/pier:${{ steps.version.outputs.VERSION }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Clone repo if not exists (first-time setup)
            PIER_DIR=~/pier
            if [ ! -d "$PIER_DIR" ]; then
              git clone https://github.com/BrodyZhang/pier "$PIER_DIR"
            fi

            cd "$PIER_DIR"

            # Create/update .env with secrets
            cat > .env << ENVEOF
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ENVEOF

            # Stop any old containers to free ports (80 and 443)
            docker stop pier-app-1 pier-db-1 2>/dev/null || true
            docker rm pier-app-1 pier-db-1 2>/dev/null || true
            docker stop pier 2>/dev/null || true
            docker rm pier 2>/dev/null || true

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            docker compose pull
            docker compose up -d

      - name: Verify container status
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 8
            cd ~/pier && docker compose ps
            echo "---"
            echo "Checking app health (port 3000)..."
            curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:3000/ || echo " (unreachable)"
            echo ""
            echo "Checking app health (port 80)..."
            curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:80/ || echo " (unreachable)"

      - name: Smoke test (external)
        run: |
          sleep 5
          echo "Checking test.ailaopo.online..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 http://test.ailaopo.online/ || echo "DNS_FAIL")
          echo "HTTP $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "301" ]; then
            echo "SUCCESS: test domain responding"
          else
            echo "NOTE: test domain may not have DNS configured yet (expected if DNS not set)"
          fi
