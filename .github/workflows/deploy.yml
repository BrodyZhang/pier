name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get version
        id: version
        run: echo "VERSION=$(date +%Y%m%d)-$(printf "%08d" ${{ github.run_number }})" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pier:latest
            ${{ secrets.DOCKER_USERNAME }}/pier:${{ steps.version.outputs.VERSION }}

  restart-vps-container:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Restart container on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            docker pull ${{ secrets.DOCKER_USERNAME }}/pier:latest
            docker stop pier || true
            docker rm pier || true
            docker run -d --restart=always -p 80:80 -p 443:443 \
              -v /etc/letsencrypt:/etc/letsencrypt \
              --name pier ${{ secrets.DOCKER_USERNAME }}/pier:latest

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 5
            CONTAINER_STATUS=$(docker inspect -f '{{.State.Running}}' pier 2>/dev/null)
            if [ "$CONTAINER_STATUS" = "true" ]; then
              echo "SUCCESS: Container is running"
              exit 0
            else
              echo "FAILED: Container is not running"
              docker logs pier
              exit 1
            fi