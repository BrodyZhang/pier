<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>花语心愿</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:linear-gradient(135deg,#1a0a2e,#16213e,#0f3460);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;padding:16px;overflow-x:hidden}
.container{max-width:420px;width:100%;padding:16px 0 80px}
.header{text-align:center;margin-bottom:20px}
.header h1{font-size:28px;background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;font-weight:700}
.header p{color:rgba(255,255,255,.6);font-size:14px;margin-top:4px}
.score-bar{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border-radius:16px;padding:12px 20px;margin-bottom:20px;border:1px solid rgba(255,255,255,.1)}
.score-bar .score{color:#ffd700;font-size:20px;font-weight:700}
.score-bar .combo{color:#ff6b6b;font-size:14px}
.refresh-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.refresh-btn:hover,.refresh-btn:active{background:rgba(255,255,255,.2);transform:rotate(180deg)}
.flowers-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
.flower-card{background:rgba(255,255,255,.06);backdrop-filter:blur(10px);border-radius:20px;padding:16px;text-align:center;cursor:pointer;transition:all .3s;border:1px solid rgba(255,255,255,.08);position:relative;overflow:hidden;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.flower-card:active{transform:scale(.95)}
.flower-card .emoji{font-size:56px;margin-bottom:8px;transition:all .3s;display:block}
.flower-card .name{color:#fff;font-size:16px;font-weight:600;margin-bottom:4px}
.flower-card .meaning{color:rgba(255,255,255,.5);font-size:12px;transition:all .3s}
.flower-card.revealed .meaning{color:#ffd700;font-size:14px;font-weight:600}
.flower-card.revealed{border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.06)}
.flower-card .particles{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden}
.particle{position:absolute;border-radius:50%;pointer-events:none;animation:particleFly 1s ease-out forwards}
@keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}
.flower-card .glow{position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:radial-gradient(circle,rgba(255,215,0,.3),transparent);transform:translate(-50%,-50%);transition:all .6s;pointer-events:none}
.flower-card.revealed .glow{width:300px;height:300px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.flower-card .emoji{animation:float 3s ease-in-out infinite}
.flower-card:nth-child(2) .emoji{animation-delay:.5s}
.flower-card:nth-child(3) .emoji{animation-delay:1s}
.flower-card:nth-child(4) .emoji{animation-delay:1.5s}
.flower-card:nth-child(5) .emoji{animation-delay:.3s}
.flower-card:nth-child(6) .emoji{animation-delay:.8s}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(0,0,0,.8);backdrop-filter:blur(20px);color:#fff;padding:30px 40px;border-radius:24px;text-align:center;z-index:1000;opacity:0;pointer-events:none;transition:all .4s;border:1px solid rgba(255,255,255,.1)}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.toast .big{font-size:48px;display:block;margin-bottom:8px}
.toast .msg{font-size:16px;line-height:1.5}
.toast .sub{color:rgba(255,255,255,.5);font-size:12px;margin-top:4px}
.combo-popup{position:fixed;top:30%;left:50%;transform:translateX(-50%);color:#ffd700;font-size:48px;font-weight:900;text-shadow:0 0 20px rgba(255,215,0,.5);pointer-events:none;z-index:999;animation:comboAnim 1s ease-out forwards}
@keyframes comboAnim{0%{opacity:1;transform:translateX(-50%) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-60px) scale(1.5)}}
.floating-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1;overflow:hidden}
.floating-bg span{position:absolute;display:block;font-size:24px;opacity:.06;animation:bgFloat 20s linear infinite}
@keyframes bgFloat{0%{transform:translateY(100vh) rotate(0deg)}100%{transform:translateY(-100vh) rotate(360deg)}}
.shake{animation:shake .5s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
</style>
</head>
<body>

<div class="floating-bg" id="bg"></div>

<div class="container">
  <div class="header">
    <h1>🌸 花语心愿</h1>
    <p>点击花朵，发现它的花语</p>
  </div>

  <div class="score-bar">
    <span class="score">✦ <span id="score">0</span></span>
    <span class="combo" id="combo"></span>
    <button class="refresh-btn" id="refreshBtn" onclick="shuffleFlowers()">↻</button>
  </div>

  <div class="flowers-grid" id="flowersGrid"></div>
</div>

<div class="toast" id="toast">
  <span class="big" id="toastEmoji">🌸</span>
  <div class="msg" id="toastMsg"></div>
  <div class="sub" id="toastSub"></div>
</div>

<script>
const flowers = [
  { emoji: '🌹', name: '玫瑰', meaning: '我爱你 — 热烈的爱情', color: '#ff4757' },
  { emoji: '🌻', name: '向日葵', meaning: '忠诚与追随 — 你是我的太阳', color: '#ffd700' },
  { emoji: '🌸', name: '樱花', meaning: '生命之美 — 转瞬即逝的绚烂', color: '#ff6b9d' },
  { emoji: '🌷', name: '郁金香', meaning: '完美的爱 — 永恒的幸福', color: '#ff6b6b' },
  { emoji: '🌺', name: '木槿', meaning: '温柔的坚持 — 永恒的美丽', color: '#ff4757' },
  { emoji: '🌼', name: '雏菊', meaning: '天真与快乐 — 藏在心底的爱', color: '#ffd93d' },
  { emoji: '💐', name: '花束', meaning: '幸福的聚集 — 所有的美好都给你', color: '#c56cf0' },
  { emoji: '🌸', name: '桃花', meaning: '爱情与机遇 — 桃之夭夭', color: '#ff9ff3' },
  { emoji: '🌿', name: '四叶草', meaning: '幸运与奇迹 — 万分之一的相遇', color: '#2ed573' },
  { emoji: '🌾', name: '薰衣草', meaning: '等待爱情 — 静静的守候', color: '#a29bfe' }
]

let currentScore = 0
let comboCount = 0
let revealedIds = new Set()
let isAnimating = false

function initBG() {
  const bg = document.getElementById('bg')
  const emojis = ['🌸','🌹','🌻','🌷','🌺','🌼','💐','🌿','🌾']
  for(let i=0;i<20;i++){
    const span = document.createElement('span')
    span.textContent = emojis[i%emojis.length]
    span.style.left = Math.random()*100 + '%'
    span.style.animationDuration = (15+Math.random()*20)+'s'
    span.style.animationDelay = Math.random()*20+'s'
    span.style.fontSize = (16+Math.random()*20)+'px'
    bg.appendChild(span)
  }
}

function shuffleArray(arr) {
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]
  }
  return arr
}

function renderFlowers() {
  const grid = document.getElementById('flowersGrid')
  grid.innerHTML = ''
  const shuffled = shuffleArray([...flowers])
  shuffled.forEach((f,i)=>{
    const card = document.createElement('div')
    card.className = 'flower-card'
    card.dataset.index = i
    card.dataset.id = i
    card.innerHTML = `
      <div class="glow"></div>
      <span class="emoji">${f.emoji}</span>
      <div class="name">${f.name}</div>
      <div class="meaning">??</div>
    `
    card.addEventListener('click',()=>handleClick(card,f,i))
    card.addEventListener('touchend',(e)=>{e.preventDefault();handleClick(card,f,i)})
    grid.appendChild(card)
  })
  revealedIds.clear()
}

function handleClick(card,flower,id){
  if(isAnimating) return
  if(card.classList.contains('revealed')){
    showToast(flower.emoji,flower.meaning,'已经发现过了 ✨')
    return
  }

  card.classList.add('revealed')
  card.querySelector('.meaning').textContent = flower.meaning
  revealedIds.add(id)

  createParticles(card,flower.color)
  comboCount++
  currentScore += 10 + comboCount * 2

  document.getElementById('score').textContent = currentScore

  if(comboCount >= 3){
    showComboPopup(comboCount)
    document.getElementById('combo').textContent = '🔥 连击 x' + comboCount
  } else {
    document.getElementById('combo').textContent = comboCount > 1 ? '✨ 连击 x' + comboCount : ''
  }

  showToast(flower.emoji,flower.meaning,'+' + (10 + comboCount * 2) + ' 分')

  if(revealedIds.size === flowers.length){
    setTimeout(()=>{
      showToast('🎉','恭喜你发现了所有花语！','总分: ' + currentScore)
    },800)
  }
}

function createParticles(card,color){
  for(let i=0;i<20;i++){
    const p = document.createElement('div')
    p.className = 'particle'
    const size = 4+Math.random()*8
    p.style.width = size+'px'
    p.style.height = size+'px'
    p.style.background = color
    p.style.setProperty('--dx',(-100+Math.random()*200)+'px')
    p.style.setProperty('--dy',(-150+Math.random()*-50)+'px')
    p.style.left = (20+Math.random()*60)+'%'
    p.style.top = (20+Math.random()*60)+'%'
    p.style.animationDuration = (.6+Math.random()*.6)+'s'
    card.querySelector('.particles')?.remove()
    const container = document.createElement('div')
    container.className = 'particles'
    container.appendChild(p)
    card.appendChild(container)
  }
}

function showToast(emoji,msg,sub){
  const t = document.getElementById('toast')
  document.getElementById('toastEmoji').textContent = emoji
  document.getElementById('toastMsg').textContent = msg
  document.getElementById('toastSub').textContent = sub || ''
  t.classList.add('show')
  clearTimeout(t._hide)
  t._hide = setTimeout(()=>t.classList.remove('show'),1800)
}

function showComboPopup(count){
  const el = document.createElement('div')
  el.className = 'combo-popup'
  el.textContent = '🔥 ' + count + '连击!'
  document.body.appendChild(el)
  setTimeout(()=>el.remove(),1000)
}

function shuffleFlowers(){
  const btn = document.getElementById('refreshBtn')
  btn.style.transform = 'rotate(360deg)'
  setTimeout(()=>btn.style.transform = '',500)
  currentScore = 0
  comboCount = 0
  document.getElementById('score').textContent = '0'
  document.getElementById('combo').textContent = ''
  renderFlowers()
  showToast('🔄','花语已重新排列','再发现一次吧！')
}

initBG()
renderFlowers()
</script>
</body>
</html>
