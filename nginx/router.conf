# HTTP — test domain (redirect to HTTPS except cert renewal)
server {
    listen 80;
    server_name test.ailaopo.online;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — test domain (proxy to app-test)
server {
    listen 443 ssl;
    server_name test.ailaopo.online;

    ssl_certificate /etc/letsencrypt/live/test.ailaopo.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.ailaopo.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10m;

    location / {
        proxy_pass http://app-test:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP — production domain (redirect to HTTPS)
server {
    listen 80;
    server_name ailaopo.online www.ailaopo.online;

    location /.well-known/acme-challenge/ {
