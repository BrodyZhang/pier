services:
  # Reverse proxy — routes by domain name
  router:
    image: brodyzhang2026/pier-router:latest
    build:
      context: .
      dockerfile: Dockerfile.router
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app-test
      - app-prod
    restart: unless-stopped

  # Test environment — pinned to TEST_VERSION
  app-test:
    image: brodyzhang2026/pier:${TEST_VERSION}
    environment:
      - DATABASE_URL=postgres://pier:pier@db:5432/pier_test
      - SESSION_SECRET=${SESSION_SECRET:-change-me}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - DEV_API_KEY=${DEV_API_KEY:-}
      - APP_ENV=test
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Production environment — controlled by PROD_VERSION tag
  app-prod:
    image: brodyzhang2026/pier:${PROD_VERSION}
    environment:
      - DATABASE_URL=postgres://pier:pier@db:5432/pier_prod
      - SESSION_SECRET=${SESSION_SECRET:-change-me}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - DEV_API_KEY=${DEV_API_KEY:-}
      - APP_ENV=prod
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: pier
      POSTGRES_PASSWORD: pier
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pier"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg-data:
